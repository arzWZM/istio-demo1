apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: rollout-vsvc
spec:
  gateways:
  - istio-system/istio-rollout-gateway
  hosts:
  - "istio-rollout.local"
  http:
  - name: primary        # referenced in canary.trafficRouting.istio.virtualService.routes  
    match:
    - port: 10443
      sniHost: 
        - istio-rollout.local
    route:
    - destination:
        host: stable-svc # referenced in canary.stableService
        port: 443
      weight: 100
    - destination:
        host: canary-svc # referenced in canary.canaryService
        port: 443
      weight: 0

apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: rollout-vsvc
spec:
  gateways:
  - istio-system/istio-rollout-gateway
  hosts:
  - "istio-rollout.local"
  http:
  - name: primary        # referenced in canary.trafficRouting.istio.virtualService.routes
    match:
    - uri:
        prefix: "/"  
    route:
    - destination:
        host: stable-svc
        port: 
          number: 80        
      weight: 100
    - destination:
        host: canary-svc
        port: 
          number: 80        
      weight: 0

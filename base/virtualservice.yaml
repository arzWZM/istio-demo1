apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: rollout-vsvc
spec:
  gateways:
  - istio-system/istio-rollout-gateway
  hosts:
  - "istio-rollout.local"
  http:
  - name: primary        # referenced in canary.trafficRouting.istio.virtualService.routes  
    match:
    - port: 10443
      sniHosts: 
      - istio-rollout2.local    
    route:
    - destination:
        host: stable-svc.default.svc.cluster.local # referenced in canary.stableService
        port: 
          number: 443
      weight: 100
    - destination:
        host: canary-svc.default.svc.cluster.local # referenced in canary.canaryService
        port: 
          number: 443
      weight: 0

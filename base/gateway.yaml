apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: istio-rollout-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
    - name: http
      number: 80
      protocol: HTTP
    - name: https
      number: 443
      protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: example-credential
      hosts:
      - "istio-rollout.local"

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-demo-1  
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io  
spec:
  project: default
  ignoreDifferences:
    - group: networking.istio.io
      kind: VirtualService
      # Automatically ignores any fields modified by the argo-rollouts controller
      managedFieldsManagers:
        - argo-rollouts
source:
    repoURL: https://github.com/arzWZM/istio-demo1.git
    targetRevision: main  
    path: overlays/dev  
  destination:
    server: https://kubernetes.default.svc  
    namespace: default 
  syncPolicy:
    automated:  
      prune: true  
      selfHeal: true  
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true  
    retry:  
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
